<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0D0F1A">
  <title>Diamond Stats</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0D0F1A;--surface:#181A28;--surface2:#20223200;
      --g:#4ADE80;--gd:#22C55E;--gl:rgba(74,222,128,.12);--gl2:rgba(74,222,128,.06);
      --am:#FBBF24;--aml:rgba(251,191,36,.12);
      --red:#F87171;--redl:rgba(248,113,113,.1);
      --blue:#818CF8;--bluel:rgba(129,140,248,.1);
      --pur:#A78BFA;--purl:rgba(167,139,250,.1);
      --text:#EEF0FF;--text2:#8A8CA8;--muted:#4E5068;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
    }
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}

    /* Header */
    .hdr{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(180deg,#161824 0%,#0D0F1A 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;z-index:100;gap:10px}
    .hdr h1{font-size:19px;font-weight:800;letter-spacing:-.3px;flex:1;color:var(--text)}
    .hdr-btn{background:rgba(255,255,255,.08);border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .hdr-btn.am{background:rgba(251,191,36,.15);color:var(--am);border-color:rgba(251,191,36,.3)}
    .hdr-btn.danger{background:rgba(248,113,113,.15);color:var(--red);border-color:rgba(248,113,113,.3)}

    /* Bottom nav */
    .bnav{position:fixed;bottom:0;left:0;right:0;height:62px;background:rgba(13,15,26,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;font-weight:600;-webkit-tap-highlight-color:transparent;padding:8px 0;transition:color .2s}
    .nb.act{color:var(--g)}
    .nb svg{width:22px;height:22px}

    /* Content */
    .content{position:fixed;top:56px;bottom:62px;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}

    /* Screens */
    .scr{display:none}.scr.act{display:block}

    /* Cards */
    .card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.4)}
    .card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}

    /* Stat grids */
    .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
    .sgrid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px}
    .si{text-align:center}
    .sv{font-size:26px;font-weight:800;color:var(--text);line-height:1}
    .sv.sm{font-size:18px}
    .sl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:600}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .1s,transform .1s;-webkit-tap-highlight-color:transparent}
    .btn:active{opacity:.8;transform:scale(.97)}
    .btn-g{background:var(--g);color:#0A0D14;font-weight:800;box-shadow:0 4px 20px rgba(74,222,128,.3)}
    .btn-am{background:var(--am);color:#0A0D14;font-weight:800}
    .btn-red{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .btn-ghost{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border2)}
    .btn-full{width:100%}
    .btn-lg{padding:16px 20px;font-size:17px;border-radius:14px}
    .btn-sm{padding:7px 13px;font-size:13px;border-radius:8px}

    /* Play buttons */
    .psec{margin-bottom:14px}
    .psec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:8px}
    .pg{display:grid;gap:8px}
    .pg2{grid-template-columns:repeat(2,1fr)}
    .pg3{grid-template-columns:repeat(3,1fr)}
    .pg4{grid-template-columns:repeat(4,1fr)}
    .pb{padding:16px 6px;border-radius:12px;border:1px solid transparent;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .12s,transform .12s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.3}
    .pb:active{opacity:.7;transform:scale(.95)}
    .pb-lbl{font-size:17px}
    .pb-dsc{font-size:11px;font-weight:500;opacity:.55;margin-top:2px}
    .pb.hit{background:rgba(74,222,128,.1);color:var(--g);border-color:rgba(74,222,128,.2)}
    .pb.xbh{background:rgba(74,222,128,.17);color:#86EFAC;border-color:rgba(74,222,128,.3)}
    .pb.hr{background:linear-gradient(135deg,rgba(74,222,128,.22),rgba(34,197,94,.32));color:var(--g);border-color:rgba(74,222,128,.5);box-shadow:0 0 24px rgba(74,222,128,.14)}
    .pb.out{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.2)}
    .pb.walk{background:rgba(129,140,248,.1);color:var(--blue);border-color:rgba(129,140,248,.2)}
    .pb.reach{background:rgba(251,191,36,.1);color:var(--am);border-color:rgba(251,191,36,.2)}
    .pb.fgood{background:rgba(167,139,250,.1);color:var(--pur);border-color:rgba(167,139,250,.2)}
    .pb.fbad{background:rgba(251,191,36,.1);color:var(--am);border-color:rgba(251,191,36,.2)}

    /* Active game banner */
    .gbanner{background:linear-gradient(135deg,#1B2040 0%,#13162A 100%);border:1px solid rgba(74,222,128,.18);color:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 0 50px rgba(74,222,128,.07)}
    .gbanner-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    .gbanner h2{font-size:18px;font-weight:800}
    .gbanner .gdate{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
    .gbanner .gpos{font-size:12px;background:rgba(74,222,128,.15);color:var(--g);padding:3px 10px;border-radius:20px;margin-top:6px;display:inline-block;font-weight:700;border:1px solid rgba(74,222,128,.25)}
    .gms{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
    .gms-v{font-size:24px;font-weight:800;text-align:center}
    .gms-l{font-size:10px;opacity:.5;text-align:center;font-weight:600;letter-spacing:.3px}

    /* Team colors */
    .tc-0{background:linear-gradient(135deg,#22C55E,#16A34A)}
    .tc-1{background:linear-gradient(135deg,#3B82F6,#2563EB)}
    .tc-2{background:linear-gradient(135deg,#A78BFA,#7C3AED)}
    .tc-3{background:linear-gradient(135deg,#F87171,#DC2626)}
    .tc-4{background:linear-gradient(135deg,#FB923C,#EA580C)}
    .dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}

    /* Team list */
    .titem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px}
    .tinfo{flex:1}
    .tname{font-weight:700;font-size:15px;color:var(--text)}
    .tpos{font-size:13px;color:var(--text2)}
    .tactions{display:flex;gap:6px}

    /* Modals */
    .mover{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .mover.hide{display:none}
    .modal{background:#181A28;border-radius:22px 22px 0 0;border:1px solid var(--border2);border-bottom:none;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:88vh;overflow-y:auto;position:relative}
    .modal h2{font-size:20px;font-weight:800;margin-bottom:20px;color:var(--text)}
    .mclose{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.08);border:1px solid var(--border2);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}

    /* Forms */
    .fgrp{margin-bottom:16px}
    .flbl{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .finput{width:100%;padding:13px 14px;border:1.5px solid var(--border2);border-radius:11px;font-size:16px;color:var(--text);background:#13151F;appearance:none;-webkit-appearance:none}
    .finput:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(74,222,128,.1)}

    /* Position grid */
    .posgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .posb{padding:11px 4px;border:1.5px solid var(--border2);border-radius:10px;background:#13151F;font-size:14px;font-weight:800;color:var(--text2);cursor:pointer;text-align:center;transition:all .1s;-webkit-tap-highlight-color:transparent}
    .posb.sel{border-color:var(--g);background:var(--gl);color:var(--g)}

    /* Stats table */
    .stbl{width:100%;border-collapse:collapse}
    .stbl th{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;padding:6px 6px;text-align:right;border-bottom:1px solid var(--border2)}
    .stbl th:first-child{text-align:left}
    .stbl td{font-size:13px;padding:9px 6px;text-align:right;border-bottom:1px solid var(--border);color:var(--text)}
    .stbl td:first-child{text-align:left;font-weight:700}
    .stbl .hi{font-weight:800;color:var(--g)}
    .stbl tr:last-child td{border-bottom:none}

    /* Play log */
    .plog{display:flex;flex-direction:column;gap:6px}
    .pentry{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:11px}
    .pbadge{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
    .bh{background:rgba(74,222,128,.15);color:var(--g)}
    .bo{background:rgba(248,113,113,.13);color:var(--red)}
    .bw{background:rgba(129,140,248,.13);color:var(--blue)}
    .bf{background:rgba(167,139,250,.13);color:var(--pur)}
    .be{background:rgba(251,191,36,.13);color:var(--am)}
    .pmain{font-size:13px;font-weight:700;color:var(--text)}
    .psub{font-size:12px;color:var(--text2)}
    .pundo{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;line-height:1;-webkit-tap-highlight-color:transparent}

    /* Segment */
    .seg{display:flex;background:#13151F;border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:14px}
    .segb{flex:1;padding:9px;border:none;border-radius:9px;background:none;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .segb.act{background:var(--surface);color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.4)}

    /* RBI picker */
    .rbipick{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}
    .rbib{padding:12px 4px;border:1.5px solid var(--border2);border-radius:10px;background:#13151F;font-size:17px;font-weight:800;cursor:pointer;text-align:center;color:var(--text);-webkit-tap-highlight-color:transparent}
    .rbib.sel{border-color:var(--am);background:rgba(251,191,36,.12);color:var(--am)}

    /* AB Detail pickers */
    .detail-sep{display:flex;align-items:center;gap:8px;margin:14px 0 12px}
    .detail-sep-line{flex:1;height:1px;background:var(--border2)}
    .detail-sep-lbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
    .drow{margin-bottom:10px}
    .drow-lbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
    .dpicks{display:flex;gap:5px}
    .dpill{flex:1;padding:9px 4px;border:1.5px solid var(--border2);border-radius:9px;background:#13151F;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all .1s;line-height:1.3}
    .dpill:active{transform:scale(.95)}
    .dpill .dico{font-size:15px;display:block;margin-bottom:1px}
    .dpill.sel-dir{border-color:var(--blue);background:rgba(129,140,248,.12);color:var(--blue)}
    .dpill.sel-traj{border-color:var(--pur);background:rgba(167,139,250,.12);color:var(--pur)}
    .dpill.sel-contact{border-color:var(--am);background:rgba(251,191,36,.12);color:var(--am)}
    .dpill.sel-pitch{border-color:var(--g);background:var(--gl);color:var(--g)}
    .dpill.sel-fball{border-color:var(--pur);background:rgba(167,139,250,.12);color:var(--pur)}
    .dpill.sel-fdiff{border-color:var(--g);background:var(--gl);color:var(--g)}
    .dpill.sel-ftype{border-color:var(--red);background:var(--redl);color:var(--red)}
    .dpill.sel-runners-none{border-color:var(--muted);background:rgba(78,80,104,.2);color:var(--text2)}
    .dpill.sel-runners-on{border-color:var(--blue);background:rgba(129,140,248,.12);color:var(--blue)}
    .dpill.sel-runners-risp{border-color:var(--am);background:var(--aml);color:var(--am)}
    .dpill.sel-scored-no{border-color:var(--muted);background:rgba(78,80,104,.2);color:var(--text2)}
    .dpill.sel-scored-yes{border-color:var(--g);background:var(--gl);color:var(--g)}
    .dpill.sel-fdp-yes{border-color:var(--am);background:var(--aml);color:var(--am)}
    .dpill.sel-fzone{border-color:var(--blue);background:rgba(129,140,248,.12);color:var(--blue)}
    /* Stat highlight */
    .stat-up{color:var(--g)}
    .stat-warn{color:var(--am)}
    .stat-bad{color:var(--red)}
    /* Secondary button row */
    .psec-secondary{margin-top:6px;display:flex;justify-content:center}
    .pb-tiny{padding:9px 12px;border-radius:10px;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
    .pb-tiny:active{opacity:.7}
    /* Detail chips on logged plays */
    .dchips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
    .dchip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px}
    .dchip-dir{background:rgba(129,140,248,.15);color:var(--blue)}
    .dchip-traj{background:rgba(167,139,250,.15);color:var(--pur)}
    .dchip-contact{background:rgba(251,191,36,.15);color:var(--am)}
    .dchip-pitch{background:rgba(74,222,128,.15);color:var(--g)}
    .dchip-fball{background:rgba(167,139,250,.15);color:var(--pur)}
    .dchip-fdiff{background:rgba(74,222,128,.15);color:var(--g)}
    .dchip-ftype{background:rgba(248,113,113,.15);color:var(--red)}
    .dchip-fzone{background:rgba(129,140,248,.15);color:var(--blue)}
    .dchip-fdp{background:rgba(251,191,36,.15);color:var(--am)}
    .psub-inline{font-size:12px;font-weight:500;color:var(--text2)}
    /* AB Profile bars */
    .prow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .prowl{font-size:11px;font-weight:700;width:46px;flex-shrink:0;color:var(--text)}
    .prowb{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
    .prowbf{height:100%;border-radius:4px}
    .prowp{font-size:11px;font-weight:800;width:34px;text-align:right;flex-shrink:0;color:var(--text)}

    /* Toggle */
    .togrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
    .togrow:last-child{border-bottom:none}
    .toglbl{font-size:15px;font-weight:500;color:var(--text)}
    .tog{width:46px;height:27px;border-radius:14px;background:rgba(255,255,255,.12);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
    .tog.on{background:var(--g)}
    .tog::after{content:'';position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 2px 6px rgba(0,0,0,.5)}
    .tog.on::after{left:22px}

    /* Team selector in start game modal */
    .tselb{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border2);border-radius:13px;background:#13151F;cursor:pointer;text-align:left;transition:all .1s;margin-bottom:8px;width:100%;-webkit-tap-highlight-color:transparent}
    .tselb.sel{border-color:var(--g);background:var(--gl)}
    .tselb-n{font-size:16px;font-weight:700;color:var(--text)}
    .tselb-p{font-size:13px;color:var(--text2)}

    /* History */
    .hitem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer}
    .hinfo{flex:1}
    .htitle{font-size:15px;font-weight:700;color:var(--text)}
    .hsub{font-size:12px;color:var(--text2);margin-top:2px}
    .hline{text-align:right}
    .hline-stat{font-size:14px;font-weight:800;color:var(--g)}
    .hline-avg{font-size:11px;color:var(--text2);font-weight:600}

    /* Empty state */
    .empty{text-align:center;padding:40px 16px;color:var(--text2)}
    .empty-ico{font-size:48px;margin-bottom:12px}
    .empty h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
    .empty p{font-size:14px;margin-bottom:20px;line-height:1.5}

    /* Toast */
    .toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(24,26,40,.97);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:22px;font-size:14px;font-weight:600;z-index:400;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;backdrop-filter:blur(12px)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Misc */
    .divider{height:1px;background:var(--border);margin:16px 0}
    .badge{display:inline-flex;align-items:center;background:var(--gl);color:var(--g);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
    .row{display:flex;align-items:center;gap:8px}
    .flex1{flex:1}
    .mt8{margin-top:8px}
    .mt12{margin-top:12px}

    /* Log screen game header */
    .loghdr{background:linear-gradient(135deg,#1B2040 0%,#13162A 100%);border:1px solid rgba(74,222,128,.18);color:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:0 0 30px rgba(74,222,128,.06)}
    .loghdr-info{flex:1}
    .loghdr-team{font-size:15px;font-weight:800}
    .loghdr-meta{font-size:12px;opacity:.55;margin-top:1px}
    .loghdr-stats{display:flex;gap:12px}
    .lhs-v{font-size:18px;font-weight:800;text-align:center}
    .lhs-l{font-size:10px;opacity:.5;text-align:center;font-weight:700;letter-spacing:.3px}

    /* Confirm bat modal rbi section */
    .rbi-section{padding:12px 0}
    .rbi-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}

    /* Score card */
    .scard{background:linear-gradient(135deg,#1B2040 0%,#13162A 100%);border:1px solid rgba(74,222,128,.18);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 0 30px rgba(74,222,128,.06)}
    .scard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .scard-vs{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px}
    .scard-toggle{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .scard-main{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px}
    .scard-side{text-align:center}
    .scard-sname{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;margin:0 auto 2px}
    .scard-num{font-size:36px;font-weight:900;color:#fff;line-height:1}
    .scard-num.win{color:var(--g)}
    .scard-mid{text-align:center}
    .scard-inn-lbl{font-size:10px;font-weight:700;color:rgba(74,222,128,.8);text-transform:uppercase;letter-spacing:.4px}
    .scard-sep{font-size:22px;font-weight:900;color:rgba(255,255,255,.2);line-height:1}
    .scard-ctrl{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
    .scard-btns{display:flex;align-items:center;gap:8px;justify-content:center}
    .scard-adj{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;line-height:1}
    .scard-adj:active{opacity:.6;transform:scale(.9)}
    .scard-cur{font-size:16px;font-weight:800;color:#fff;min-width:20px;text-align:center}
    .scard-next-btn{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:var(--g);font-size:11px;font-weight:800;padding:8px 10px;border-radius:10px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;white-space:nowrap}
    .scard-next-btn:active{opacity:.7}
    /* Box score */
    .bbox{margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .bbox-tbl{width:100%;border-collapse:collapse}
    .bbox-tbl th{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-align:center;padding:3px 5px;border-bottom:1px solid rgba(255,255,255,.08)}
    .bbox-tbl th:first-child{text-align:left}
    .bbox-tbl td{font-size:12px;font-weight:700;color:rgba(255,255,255,.6);text-align:center;padding:4px 5px}
    .bbox-tbl td:first-child{text-align:left;color:rgba(255,255,255,.4);font-size:11px}
    .bbox-r{font-weight:900!important;color:#fff!important;font-size:13px!important}
    .bbox-win{color:var(--g)!important}
    /* Calendar */
    .cal-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .cal-item:last-child{border-bottom:none}
    .cal-date{font-size:11px;font-weight:800;color:var(--am);width:38px;text-align:center;flex-shrink:0;line-height:1.4}
    .cal-info{flex:1}
    .cal-title{font-size:13px;font-weight:700;color:var(--text)}
    .cal-loc{font-size:11px;color:var(--text2);margin-top:1px}
    /* Upcoming game suggestion */
    .upcoming-game{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.18);border-radius:10px;cursor:pointer;margin-bottom:6px;-webkit-tap-highlight-color:transparent}
    .upcoming-game:active{opacity:.7}
    .ug-date{font-size:10px;font-weight:800;color:var(--am);width:38px;text-align:center;flex-shrink:0;line-height:1.4}
    .ug-info{flex:1}
    .ug-title{font-size:13px;font-weight:700;color:var(--text)}
    .ug-loc{font-size:11px;color:var(--text2)}
  </style>
</head>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────

const POSITIONS = ['P','C','1B','2B','3B','SS','LF','CF','RF','SF','DH','UT'];

function load(){
  return JSON.parse(localStorage.getItem('ds_data')||'null') || {teams:[],games:[],activeGameId:null};
}
function save(d){ localStorage.setItem('ds_data', JSON.stringify(d)); }

let db = load();
let currentStatsTab = 'overall';
let currentStatsYear = new Date().getFullYear();

// Temp state for pending bat log
let pendingBat = null;
let batScored = false;
let batRBIs = 0;
let batDetails = {dir:null, traj:null, contact:null, pitch:null};
let batRunners = 'none';

// Temp state for pending field log
let pendingField = null;
let fieldDetails = {fball:null, fzone:null, fdiff:null, ftype:null, fdp:false};
let selectedTeamId = null;
let selectedGamePos = null;

// ─── SCREEN NAV ──────────────────────────────────────────────────────────────

function showScr(name){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('scr-'+name).classList.add('act');
  document.getElementById('nb-'+name).classList.add('act');
  renderHeader(name);
  if(name==='home') renderHome();
  if(name==='log') renderLog();
  if(name==='stats') renderStats(currentStatsTab);
  if(name==='teams') renderTeams();
}

function renderHeader(name){
  const el = document.getElementById('hdrActions');
  el.innerHTML = '';
  if(name==='home' && db.activeGameId){
    el.innerHTML = `<button class="hdr-btn danger" onclick="endGame()">End Game</button>`;
  }
  if(name==='home' && !db.activeGameId){
    el.innerHTML = `<button class="hdr-btn am" onclick="openStartGame()">Start Game</button>`;
  }
  if(name==='log' && db.activeGameId){
    el.innerHTML = `<button class="hdr-btn danger" onclick="endGame()">End Game</button>`;
  }
  if(name==='teams'){
    el.innerHTML = `<button class="hdr-btn" onclick="exportData()" style="margin-right:6px">⬇ Backup</button><button class="hdr-btn am" onclick="openAddTeam()">+ Team</button>`;
  }
}

// ─── HOME ─────────────────────────────────────────────────────────────────────

function renderHome(){
  const el = document.getElementById('homeContent');
  const game = db.activeGameId ? db.games.find(g=>g.id===db.activeGameId) : null;

  if(!db.teams.length){
    el.innerHTML = `
      <div class="empty">
        <div class="empty-ico">⚾</div>
        <h3>Welcome to Diamond Stats</h3>
        <p>Track your personal softball stats across all your teams. Get started by adding your teams.</p>
        <button class="btn btn-g btn-lg" onclick="showScr('teams');openAddTeam()">Add Your First Team</button>
      </div>`;
    return;
  }

  let html = '';

  if(game){
    const team = db.teams.find(t=>t.id===game.teamId)||{name:'Unknown',color:0};
    const gs = gameStats(game);
    const scoreTotals = getScoreTotals(game);
    const hasScore = game.innings && (scoreTotals.us > 0 || scoreTotals.them > 0);
    const scoreRow = hasScore ? `
        <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;padding:10px;background:rgba(0,0,0,.2);border-radius:10px">
          <div style="text-align:center;min-width:60px">
            <div style="font-size:11px;font-weight:700;opacity:.45;margin-bottom:2px">${team.name.split(' ')[0]}</div>
            <div style="font-size:28px;font-weight:900;color:${scoreTotals.us>=scoreTotals.them?'var(--g)':'#fff'}">${scoreTotals.us}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;font-weight:700;color:rgba(74,222,128,.7);text-transform:uppercase">INN ${game.innings.length}</div>
            <div style="font-size:18px;font-weight:900;color:rgba(255,255,255,.2)">–</div>
          </div>
          <div style="text-align:center;min-width:60px">
            <div style="font-size:11px;font-weight:700;opacity:.45;margin-bottom:2px">${(game.opponent||'Them').split(' ')[0]}</div>
            <div style="font-size:28px;font-weight:900;color:${scoreTotals.them>scoreTotals.us?'var(--g)':'#fff'}">${scoreTotals.them}</div>
          </div>
        </div>` : '';
    html += `
      <div class="gbanner">
        <div class="gbanner-top">
          <div>
            <div class="gdate">${formatDate(game.date)} · Active Game${game.opponent?' · vs. '+game.opponent:''}</div>
            <h2>${team.name}</h2>
            <div class="gpos">${game.position}</div>
          </div>
          <button class="hdr-btn" onclick="showScr('log')" style="background:rgba(255,255,255,.25)">Log Play →</button>
        </div>
        ${scoreRow}
        <div class="gms">
          <div><div class="gms-v">${gs.ab}</div><div class="gms-l">AB</div></div>
          <div><div class="gms-v">${gs.h}</div><div class="gms-l">H</div></div>
          <div><div class="gms-v">${gs.rbi}</div><div class="gms-l">RBI</div></div>
          <div><div class="gms-v">${gs.r}</div><div class="gms-l">R</div></div>
          <div><div class="gms-v">${avgFmt(gs.h,gs.ab)}</div><div class="gms-l">AVG</div></div>
        </div>
      </div>`;
  } else {
    html += `
      <div class="gbanner" style="text-align:center;padding:24px 16px">
        <div style="font-size:40px;margin-bottom:10px">⚾</div>
        <div style="font-size:17px;font-weight:800;margin-bottom:6px">No Active Game</div>
        <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:18px">Start a game to log your plays</div>
        <button class="btn btn-g btn-full" onclick="openStartGame()">Start Game</button>
      </div>`;
  }

  // Career summary
  const all = allStats();
  const hitStreak = calcHitStreak();
  const obStreak = calcOnBaseStreak();
  html += `
    <div class="card">
      <div class="card-title">Career Batting</div>
      <div class="sgrid">
        <div class="si"><div class="sv">${avgFmt(all.h,all.ab)}</div><div class="sl">AVG</div></div>
        <div class="si"><div class="sv sm">${obpFmt(all)}</div><div class="sl">OBP</div></div>
        <div class="si"><div class="sv sm">${slgFmt(all)}</div><div class="sl">SLG</div></div>
        <div class="si"><div class="sv sm">${opsFmt(all)}</div><div class="sl">OPS</div></div>
      </div>
      <div class="divider"></div>
      <div class="sgrid-5">
        <div class="si"><div class="sv sm">${all.g}</div><div class="sl">G</div></div>
        <div class="si"><div class="sv sm">${all.ab}</div><div class="sl">AB</div></div>
        <div class="si"><div class="sv sm">${all.h}</div><div class="sl">H</div></div>
        <div class="si"><div class="sv sm">${all.rbi}</div><div class="sl">RBI</div></div>
        <div class="si"><div class="sv sm">${all.hr}</div><div class="sl">HR</div></div>
      </div>
      ${hitStreak > 0 || obStreak > 0 ? `
      <div class="divider"></div>
      <div class="sgrid" style="grid-template-columns:1fr 1fr">
        <div class="si">
          <div class="sv sm" style="color:var(--am)">${hitStreak}</div>
          <div class="sl">🔥 Hit Streak</div>
        </div>
        <div class="si">
          <div class="sv sm" style="color:var(--blue)">${obStreak}</div>
          <div class="sl">⚡ OB Streak</div>
        </div>
      </div>` : ''}
    </div>`;

  // Recent games
  const recent = [...db.games].filter(g=>g.id!==db.activeGameId).sort((a,b)=>b.date-a.date).slice(0,5);
  if(recent.length){
    html += `<div class="card"><div class="card-title">Recent Games</div>`;
    recent.forEach(g=>{
      const t = db.teams.find(t=>t.id===g.teamId)||{name:'?',color:0};
      const rgs = gameStats(g);
      const st = getScoreTotals(g);
      const scoreStr = (g.innings && (st.us||st.them)) ? ` · ${st.us}–${st.them}` : '';
      html += `
        <div class="hitem" onclick="openGameDetail('${g.id}')">
          <div class="dot tc-${t.color||0}">${t.name[0]}</div>
          <div class="hinfo">
            <div class="htitle">${t.name}${g.opponent?` <span style="color:var(--text2);font-weight:500;font-size:13px">vs. ${g.opponent}</span>`:''}</div>
            <div class="hsub">${formatDate(g.date)} · ${g.position}</div>
          </div>
          <div class="hline">
            <div class="hline-stat">${rgs.h}-${rgs.ab}${scoreStr}</div>
            <div class="hline-avg">${avgFmt(rgs.h,rgs.ab)}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

      </div>
    </div>
    ${renderScoreCard(game, team)}

    <div class="psec">
      <div class="psec-title">Batting</div>
      <div class="pg pg3" style="margin-bottom:8px">
        <button class="pb hit" onclick="logBat('1B')"><div class="pb-lbl">1B</div><div class="pb-dsc">Single</div></button>
        <button class="pb xbh" onclick="logBat('2B')"><div class="pb-lbl">2B</div><div class="pb-dsc">Double</div></button>
        <button class="pb xbh" onclick="logBat('3B')"><div class="pb-lbl">3B</div><div class="pb-dsc">Triple</div></button>
      </div>
      <div class="pg pg3" style="margin-bottom:8px">

        <button class="pb walk" onclick="logBat('BB')"><div class="pb-lbl">BB</div><div class="pb-dsc">Walk</div></button>
        <button class="pb out" onclick="logBat('K')"><div class="pb-lbl">K</div><div class="pb-dsc">Strikeout</div></button>
      </div>
      <div class="pg pg3" style="margin-bottom:8px">
        <button class="pb out" onclick="logBat('GO')"><div class="pb-lbl">GO</div><div class="pb-dsc">Ground Out</div></button>
        <button class="pb out" onclick="logBat('FO')"><div class="pb-lbl">FO</div><div class="pb-dsc">Fly Out</div></button>
        <button class="pb out" onclick="logBat('LO')"><div class="pb-lbl">LO</div><div class="pb-dsc">Line Out</div></button>
      </div>
      <div class="pg pg3">
        <button class="pb out" onclick="logBat('SF')"><div class="pb-lbl">SF</div><div class="pb-dsc">Sac Fly</div></button>
        <button class="pb reach" onclick="logBat('FC')"><div class="pb-lbl">FC</div><div class="pb-dsc">Fielder's Choice</div></button>
        <button class="pb reach" onclick="logBat('EReach')"><div class="pb-lbl">ROE</div><div class="pb-dsc">Reached on Error</div></button>
      </div>
      <div class="psec-secondary">
        <button class="pb-tiny" onclick="logBat('HBP')">HBP — Hit by Pitch</button>
      </div>
    </div>

    <div class="psec">
      <div class="psec-title">Fielding</div>
      <div class="pg pg4" style="margin-bottom:8px">
        <button class="pb fgood" onclick="logField('PO')"><div class="pb-lbl">PO</div><div class="pb-dsc">Putout</div></button>
        <button class="pb fgood" onclick="logField('A')"><div class="pb-lbl">A</div><div class="pb-dsc">Assist</div></button>
        <button class="pb fgood" onclick="logField('OFA')"><div class="pb-lbl">OFA</div><div class="pb-dsc">OF Assist</div></button>
        <button class="pb fbad" onclick="logField('E')"><div class="pb-lbl">E</div><div class="pb-dsc">Error</div></button>
      </div>
    </div>`;

  // Recent plays in this game
  if(game.events.length){
    html += `<div class="card"><div class="card-title">This Game</div><div class="plog">`;

    recent.forEach((ev,i)=>{
      const idx = game.events.length - 1 - i;
      html += renderEventEntry(ev, idx, game.id);

    html += `</div></div>`;

  el.innerHTML = html;

const DETAIL_LABELS = {
  dir:     {pull:'◀ Pull', center:'▲ Cent', oppo:'▶ Oppo'},
  traj:    {gb:'↘ GB', ld:'→ LD', fb:'↗ FB', pu:'↑ PU'},
  contact: {barrel:'🎯 Barrel', solid:'✓ Solid', weak:'✗ Weak'},
  pitch:   {good:'✓ Good', bad:'✗ Chased'}
};

function renderEventEntry(ev, idx, gameId){
  if(ev.type==='bat'){
    const isHit = ['1B','2B','3B','HR'].includes(ev.result);
    const isWalk = ['BB','HBP'].includes(ev.result);
    const cls = isHit?'bh':isWalk?'bw':'bo';
    const extras = [];
    if(ev.rbis>0) extras.push(`${ev.rbis} RBI`);
    if(ev.scored) extras.push('Scored');
    if(ev.runners==='risp') extras.push('🔥 RISP');
    else if(ev.runners==='on') extras.push('● On');
    const chips = [];
    if(ev.dir)     chips.push(`<span class="dchip dchip-dir">${DETAIL_LABELS.dir[ev.dir]||ev.dir}</span>`);
    if(ev.traj)    chips.push(`<span class="dchip dchip-traj">${DETAIL_LABELS.traj[ev.traj]||ev.traj}</span>`);
    if(ev.contact) chips.push(`<span class="dchip dchip-contact">${DETAIL_LABELS.contact[ev.contact]||ev.contact}</span>`);
    if(ev.pitch)   chips.push(`<span class="dchip dchip-pitch">${DETAIL_LABELS.pitch[ev.pitch]||ev.pitch}</span>`);
    const extrasStr = extras.length ? `<span class="psub-inline"> · ${extras.join(' · ')}</span>` : '';
    return `<div class="pentry">
      <div class="pbadge ${cls}">${ev.result}</div>
      <div class="flex1">
        <div class="pmain">${batLabel(ev.result)}${extrasStr}</div>
        ${chips.length?`<div class="dchips">${chips.join('')}</div>`:''}
      </div>
      <button class="pundo" onclick="undoEvent('${gameId}',${idx})" title="Undo">×</button>
    </div>`;
  }
  if(ev.type==='field'){
    const cls = ev.play==='E'?'be':ev.play==='OFA'?'bh':'bf';
    const FBALL_LBL = {gb:'↘ GB', ld:'→ LD', fb:'↗ FB', pu:'↑ PU'};
    const FZONE_LBL = {left:'◀ Left', middle:'▲ Mid', right:'▶ Right'};
    const FDIFF_LBL = {routine:'✓ Routine', tough:'💪 Tough', webgem:'⭐ Web Gem'};
    const FTYPE_LBL = {bobble:'👋 Bobble', badthrow:'🎯 Bad Throw', lostit:'🌞 Lost It', drop:'✗ Drop'};
    const fchips = [];
    if(ev.fball) fchips.push(`<span class="dchip dchip-fball">${FBALL_LBL[ev.fball]||ev.fball}</span>`);
    if(ev.fzone) fchips.push(`<span class="dchip dchip-fzone">${FZONE_LBL[ev.fzone]||ev.fzone}</span>`);
    if(ev.fdiff) fchips.push(`<span class="dchip dchip-fdiff">${FDIFF_LBL[ev.fdiff]||ev.fdiff}</span>`);
    if(ev.fdp)   fchips.push(`<span class="dchip dchip-fdp">⚡ DP</span>`);
    if(ev.ftype) fchips.push(`<span class="dchip dchip-ftype">${FTYPE_LBL[ev.ftype]||ev.ftype}</span>`);
    return `<div class="pentry">
      <div class="pbadge ${cls}">${ev.play}</div>
      <div class="flex1">
        <div class="pmain">${fieldLabel(ev.play)}</div>
        ${fchips.length?`<div class="dchips">${fchips.join('')}</div>`:''}
      </div>
      <button class="pundo" onclick="undoEvent('${gameId}',${idx})" title="Undo">×</button>
    </div>`;
  }
  return '';
}

function batLabel(r){
  const m={
    '1B':'Single','2B':'Double','3B':'Triple','HR':'Home Run',
    'BB':'Walk','HBP':'Hit by Pitch','K':'Strikeout',
    'GO':'Ground Out','FO':'Fly Out','LO':'Line Out',
    'SF':'Sacrifice Fly','FC':"Fielder's Choice",'EReach':'Reached on Error'
  };
  return m[r]||r;
}
function fieldLabel(p){
  return {PO:'Putout', A:'Assist', OFA:'OF Assist', E:'Error'}[p]||p;
}

function logBat(result){
  const isOut = ['K','GO','FO','LO','SF'].includes(result);
  pendingBat = result;
  batRBIs = 0;
  batScored = false;
  batDetails = {dir:null, traj:null, contact:null, pitch:null};
  batRunners = 'none';
  document.getElementById('bat-modal-title').textContent = batLabel(result);
  // Reset runners picker to 'none'
  document.querySelectorAll('#runners-picks .dpill').forEach(b=>b.className='dpill');
  document.querySelector('#runners-picks .dpill').classList.add('sel-runners-none');
  // Show RBI section only for non-outs (except SF which can have RBIs)
  const showRBI = !isOut || result==='SF';
  document.getElementById('bat-rbi-wrap').style.display = showRBI ? 'block' : 'none';
  if(showRBI){
    let html = '';
    for(let i=0;i<=4;i++){
      html += `<button class="rbib${i===0?' sel':''}" onclick="selectRBI(${i})">${i}</button>`;
    }
    document.getElementById('rbi-picker').innerHTML = html;
    // Reset scored to No
    document.querySelectorAll('#scored-picks .dpill').forEach(b=>b.className='dpill');
    document.querySelector('#scored-picks .dpill').classList.add('sel-scored-no');
  }
  // Smart detail rows: outs only show pitch quality
  const showContact = !isOut;
  document.getElementById('bat-drow-dir').style.display = showContact ? 'block' : 'none';
  document.getElementById('bat-drow-traj').style.display = showContact ? 'block' : 'none';
  document.getElementById('bat-drow-contact').style.display = showContact ? 'block' : 'none';
  // Clear all detail pill selections
  document.querySelectorAll('#modal-bat .dpill').forEach(b=>{ b.className='dpill'; });
  openModal('modal-bat');
}


function selectRBI(n){
  batRBIs = n;
  document.querySelectorAll('.rbib').forEach((b,i)=>{
    b.classList.toggle('sel', i===n);
  });
}

function selScored(val, btn){
  batScored = val;
  document.querySelectorAll('#scored-picks .dpill').forEach(b=>b.className='dpill');
  btn.classList.add(val ? 'sel-scored-yes' : 'sel-scored-no');
}

function selFDP(val, btn){
  fieldDetails.fdp = val;
  document.querySelectorAll('#fdp-picks .dpill').forEach(b=>b.className='dpill');
  btn.classList.add(val ? 'sel-fdp-yes' : 'sel-scored-no');
}

function selRunners(val, btn){
  batRunners = val;
  const cls = {none:'sel-runners-none', on:'sel-runners-on', risp:'sel-runners-risp'}[val];
  document.querySelectorAll('#runners-picks .dpill').forEach(b=>b.className='dpill');
  btn.classList.add(cls);
}

function selDetail(group, val, btn){
  const cls = {dir:'sel-dir',traj:'sel-traj',contact:'sel-contact',pitch:'sel-pitch'}[group];
  btn.closest('.dpicks').querySelectorAll('.dpill').forEach(b=>b.classList.remove(cls));
  if(batDetails[group]===val){
    batDetails[group]=null; // toggle off
  } else {
    batDetails[group]=val;
    btn.classList.add(cls);
  }
}

function confirmBat(){
  if(!db.activeGameId || !pendingBat) return;
  const game = db.games.find(g=>g.id===db.activeGameId);
  game.events.push({type:'bat',result:pendingBat,rbis:batRBIs,scored:batScored,runners:batRunners,...batDetails});
  save(db);
  closeModal('modal-bat');
  const extras = [];
  if(batRBIs>0) extras.push(`${batRBIs} RBI`);
  if(batScored) extras.push('Scored');
  toast(batLabel(pendingBat)+(extras.length?' · '+extras.join(', '):''));
  renderLog();
  renderHome();
  pendingBat = null;
}

function logField(play){
  if(!db.activeGameId) return;
  pendingField = play;
  fieldDetails = {fball:null, fzone:null, fdiff:null, ftype:null, fdp:false};
  document.getElementById('field-modal-title').textContent = fieldLabel(play);
  const isError = play==='E';
  document.getElementById('field-diff-row').style.display = isError ? 'none' : 'block';
  document.getElementById('field-dp-row').style.display  = isError ? 'none' : 'block';
  document.getElementById('field-etype-row').style.display = isError ? 'block' : 'none';
  // Clear all pills and reset DP to No
  document.querySelectorAll('#modal-field .dpill').forEach(b=>{ b.className='dpill'; });
  document.querySelector('#fdp-picks .dpill').classList.add('sel-scored-no');
  openModal('modal-field');
}

function selFD(group, val, btn){
  const cls = {fball:'sel-fball', fzone:'sel-fzone', fdiff:'sel-fdiff', ftype:'sel-ftype'}[group];
  btn.closest('.dpicks').querySelectorAll('.dpill').forEach(b=>b.classList.remove(cls));
  if(fieldDetails[group]===val){
    fieldDetails[group]=null;
  } else {
    fieldDetails[group]=val;
    btn.classList.add(cls);
  }
}

function confirmField(){
  if(!db.activeGameId || !pendingField) return;
  const game = db.games.find(g=>g.id===db.activeGameId);
  game.events.push({type:'field', play:pendingField, ...fieldDetails});
  save(db);
  closeModal('modal-field');
  toast(fieldLabel(pendingField)+' logged');
  renderLog();
  pendingField = null;
}

function undoEvent(gameId, idx){
  const game = db.games.find(g=>g.id===gameId);
  if(!game) return;
  const ev = game.events[idx];
  game.events.splice(idx,1);
  save(db);
  toast('Undone: '+( ev.type==='bat'?batLabel(ev.result):fieldLabel(ev.play) ));
  renderLog();
  renderHome();
}

// ─── START / END GAME ────────────────────────────────────────────────────────

function openStartGame(){
  if(!db.teams.length){
    toast('Add a team first!');
    showScr('teams');
    openAddTeam();
    return;
  }
  selectedTeamId = db.teams[0].id;
  selectedGamePos = db.teams[0].position;
  const oppInp = document.getElementById('input-opponent');
  if(oppInp) oppInp.value = '';
  buildTeamSelector();
  openModal('modal-start');
}

function buildTeamSelector(){
  const el = document.getElementById('team-selector');
  el.innerHTML = db.teams.map(t=>`
    <button class="tselb${t.id===selectedTeamId?' sel':''}" onclick="selectTeam('${t.id}')">
      <div class="dot tc-${t.color||0}">${t.name[0]}</div>
      <div>
        <div class="tselb-n">${t.name}</div>
        <div class="tselb-p">${t.position}${t.calendar?' · 📅':''}</div>
      </div>
    </button>`).join('');
  buildPosGridGame();
  updateUpcomingSuggestions();
}

function selectTeam(id){
  selectedTeamId = id;
  const t = db.teams.find(t=>t.id===id);
  if(t) selectedGamePos = t.position;
  buildTeamSelector();
}

function buildPosGridGame(){
  const el = document.getElementById('pos-grid-game');
  el.innerHTML = POSITIONS.map(p=>`
    <button class="posb${p===selectedGamePos?' sel':''}" onclick="selectGamePos('${p}')">${p}</button>`).join('');
  document.getElementById('pos-override-section').style.display = 'block';
}

function selectGamePos(pos){
  selectedGamePos = pos;
  buildPosGridGame();
}

function startGame(){
  if(!selectedTeamId){ toast('Pick a team'); return; }
  if(db.activeGameId){
    if(!confirm('End current game and start a new one?')) return;
    db.activeGameId = null;
  }
  const opponent = (document.getElementById('input-opponent').value||'').trim();
  const id = uid();
  db.games.push({id, teamId:selectedTeamId, position:selectedGamePos||'DH', date:Date.now(), events:[], opponent, innings:[{us:0,them:0}]});
  db.activeGameId = id;
  save(db);
  closeModal('modal-start');
  showScr('log');
  toast('Game started! Log your plays.');
}

function endGame(){
  if(!confirm('End the current game?')) return;
  db.activeGameId = null;
  save(db);
  renderHeader('home');
  renderHome();
  showScr('home');
  toast('Game saved!');
}

function statsTab(tab){
  currentStatsTab = tab;
  document.querySelectorAll('.segb').forEach((b,i)=>{
    b.classList.toggle('act', ['overall','batting','fielding'][i]===tab);
  });
  renderStats(tab);
}

function setStatsYear(y){
  currentStatsYear = y;
  renderStats(currentStatsTab);
}

function getYearGames(){
  if(currentStatsYear === 'all') return db.games;
  return db.games.filter(g=>new Date(g.date).getFullYear()===currentStatsYear);
}

function renderYearPicker(){
  const years = [...new Set(db.games.map(g=>new Date(g.date).getFullYear()))].sort((a,b)=>b-a);
  if(years.length < 2) return '';
  const opts = [{label:'All Time', val:'all'}, ...years.map(y=>({label:String(y),val:y}))];
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${opts.map(o=>`<button onclick="setStatsYear(${typeof o.val==='string'?`'${o.val}'`:o.val})"
      style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid ${currentStatsYear===o.val?'var(--g)':'var(--border2)'};
      background:${currentStatsYear===o.val?'var(--gl)':'transparent'};color:${currentStatsYear===o.val?'var(--g)':'var(--text2)'};cursor:pointer;-webkit-tap-highlight-color:transparent">
      ${o.label}</button>`).join('')}
  </div>`;
}

function renderStats(tab){
  const el = document.getElementById('statsContent');
  if(!db.games.length){
    el.innerHTML = `<div class="empty"><div class="empty-ico">📊</div><h3>No games yet</h3><p>Start a game and log plays to see your stats here.</p></div>`;
    return;
  }

  const yp = renderYearPicker();
  const yearGames = getYearGames().filter(g=>g.id!==db.activeGameId);

  if(tab==='overall'){
    let html = yp;
    html += `
      <div class="card">
        <div class="card-title">Key Rates</div>

          <div class="si"><div class="sv sm">${obpFmt(s)}</div><div class="sl">OBP</div></div>
          <div class="si"><div class="sv sm">${wobaFmt(s)}</div><div class="sl">wOBA</div></div>
          <div class="si"><div class="sv sm">${babipFmt(s)}</div><div class="sl">BABIP</div></div>
        </div>

        <div class="sgrid" style="grid-template-columns:repeat(3,1fr)">

          <div class="si"><div class="sv sm">${isoFmt(s)}</div><div class="sl">ISO</div></div>

        <div class="sgrid-5">

          <div class="si"><div class="sv sm">${s.pa}</div><div class="sl">PA</div></div>
          <div class="si"><div class="sv sm">${s.ab}</div><div class="sl">AB</div></div>
          <div class="si"><div class="sv sm">${s.h}</div><div class="sl">H</div></div>
          <div class="si"><div class="sv sm" style="color:var(--g)">${s.hr}</div><div class="sl">HR</div></div>
        </div>
      </div>`;

    const hitStrk = calcHitStreak();
    const obStrk  = calcOnBaseStreak();
    if(hitStrk > 0 || obStrk > 0){
      html += `<div class="card">
        <div class="card-title">Active Streaks</div>
        <div class="sgrid" style="grid-template-columns:1fr 1fr">
          <div class="si"><div class="sv" style="color:var(--am)">${hitStrk}</div><div class="sl">🔥 Hit Streak</div></div>

function openAddTeam(){
  document.getElementById('modal-team-title').textContent = 'Add Team';
  document.getElementById('input-team-name').value = '';
  document.getElementById('input-team-id').value = '';
  buildPosGrid('pos-grid-team', '');
  openModal('modal-team');
  setTimeout(()=>document.getElementById('input-team-name').focus(), 200);
}

function openEditTeam(id){
  const t = db.teams.find(t=>t.id===id);
  if(!t) return;
  document.getElementById('modal-team-title').textContent = 'Edit Team';
  document.getElementById('input-team-name').value = t.name;
  document.getElementById('input-team-id').value = t.id;
  buildPosGrid('pos-grid-team', t.position);
  openModal('modal-team');
}

function buildPosGrid(containerId, selected){
  const el = document.getElementById(containerId);
  el.innerHTML = POSITIONS.map(p=>`
    <button class="posb${p===selected?' sel':''}" onclick="selectPos(this,'${containerId}','${p}')">${p}</button>`
  ).join('');
}

function selectPos(btn, containerId, pos){
  document.querySelectorAll(`#${containerId} .posb`).forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function getSelectedPos(containerId){
  const sel = document.querySelector(`#${containerId} .posb.sel`);
  return sel ? sel.textContent : null;
}

function saveTeam(){
  const name = document.getElementById('input-team-name').value.trim();
  const id = document.getElementById('input-team-id').value;
  const pos = getSelectedPos('pos-grid-team');
  if(!name){ toast('Enter a team name'); return; }
  if(!pos){ toast('Select a position'); return; }

  if(id){
    const t = db.teams.find(t=>t.id===id);
    t.name = name;
    t.position = pos;
  } else {
    const colors = [0,1,2,3,4];
    const usedColors = db.teams.map(t=>t.color||0);
    const color = colors.find(c=>!usedColors.includes(c)) ?? (db.teams.length % 5);
    db.teams.push({id:uid(), name, position:pos, color});
  }
  save(db);
  closeModal('modal-team');
  renderTeams();
  toast(id?'Team updated':'Team added!');
}

function deleteTeam(id){
  if(!confirm('Delete this team? Game history will be kept.')) return;
  db.teams = db.teams.filter(t=>t.id!==id);
  save(db);
  renderTeams();
  toast('Team deleted');
}

// ─── STATS CALC ──────────────────────────────────────────────────────────────

function gameStats(game){
  let ab=0,h=0,d=0,t=0,hr=0,rbi=0,r=0,bb=0,k=0,go=0,fo=0,lo=0,hbp=0,sf=0,po=0,a=0,e=0,ofa=0,dp=0;
  let rrisp_ab=0,rrisp_h=0,rrisp_rbi=0;
  game.events.forEach(ev=>{
    if(ev.type==='bat'){
      const res = ev.result;
      if(!['BB','HBP','SF'].includes(res)) ab++;
      if(['1B','2B','3B','HR'].includes(res)) h++;
      if(res==='2B') d++;
      if(res==='3B') t++;
      if(res==='HR') hr++;
      if(res==='BB') bb++;
      if(res==='K') k++;
      if(res==='GO') go++;
      if(res==='FO') fo++;
      if(res==='LO') lo++;
      if(res==='HBP') hbp++;
      if(res==='SF') sf++;
      rbi += (ev.rbis||0);
      if(ev.scored) r++;
      if(ev.runners==='risp'){
        if(!['BB','HBP','SF'].includes(res)) rrisp_ab++;
        if(['1B','2B','3B','HR'].includes(res)) rrisp_h++;
        rrisp_rbi += (ev.rbis||0);
      }
    }
    if(ev.type==='field'){
      if(ev.play==='PO') po++;
      if(ev.play==='A' || ev.play==='OFA') a++;
      if(ev.play==='OFA') ofa++;
      if(ev.play==='E') e++;
      if(ev.fdp) dp++;
    }
  });
  const pa = ab+bb+hbp+sf;
  return {ab,h,d,t,hr,rbi,r,bb,k,go,fo,lo,hbp,sf,po,a,e,ofa,dp,pa,rrisp_ab,rrisp_h,rrisp_rbi,g:1};
}

function teamStats(teamId, srcGames){
  const games = (srcGames||db.games).filter(g=>g.teamId===teamId);
  return mergeStats(games);
}

function allStats(srcGames){
  return mergeStats(srcGames||db.games);
}

function mergeStats(games){
  let ab=0,h=0,d=0,t=0,hr=0,rbi=0,r=0,bb=0,k=0,go=0,fo=0,lo=0,hbp=0,sf=0,po=0,a=0,e=0,ofa=0,dp=0,g=0;
  let rrisp_ab=0,rrisp_h=0,rrisp_rbi=0;
  games.forEach(game=>{
    const gs = gameStats(game);
    ab+=gs.ab;h+=gs.h;d+=gs.d;t+=gs.t;hr+=gs.hr;
    rbi+=gs.rbi;r+=gs.r;bb+=gs.bb;k+=gs.k;go+=gs.go;fo+=gs.fo;lo+=gs.lo;
    hbp+=gs.hbp;sf+=gs.sf;po+=gs.po;a+=gs.a;e+=gs.e;ofa+=gs.ofa;dp+=gs.dp;g++;
    rrisp_ab+=gs.rrisp_ab;rrisp_h+=gs.rrisp_h;rrisp_rbi+=gs.rrisp_rbi;
  });
  const pa=ab+bb+hbp+sf;
  return {g,ab,h,d,t,hr,rbi,r,bb,k,go,fo,lo,hbp,sf,po,a,e,ofa,dp,pa,rrisp_ab,rrisp_h,rrisp_rbi};
}

function calcHitStreak(){
  const completed = db.games.filter(g=>g.id!==db.activeGameId).sort((a,b)=>b.date-a.date);
  let streak = 0;
  for(const g of completed){
    const gs = gameStats(g);
    if(gs.h > 0) streak++;
    else break;
  }
  return streak;
}

function calcOnBaseStreak(){
  const completed = db.games.filter(g=>g.id!==db.activeGameId).sort((a,b)=>b.date-a.date);
  let streak = 0;
  for(const g of completed){
    const gs = gameStats(g);
    if(gs.h + gs.bb + gs.hbp > 0) streak++;
    else break;
  }
  return streak;
}

function exportData(){
  const json = localStorage.getItem('ds_data') || '{}';
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'diamond-stats-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

}

function calcFieldProfile(games){
  const evs = games.flatMap(g=>g.events.filter(e=>e.type==='field'));
  const good = evs.filter(e=>e.play!=='E');
  const errs = evs.filter(e=>e.play==='E');
  const cnt = (arr,f,v) => arr.filter(e=>e[f]===v).length;
  const tot = (arr,f) => arr.filter(e=>e[f]).length;
  return {
    fball:  {gb:cnt(evs,'fball','gb'),ld:cnt(evs,'fball','ld'),fb:cnt(evs,'fball','fb'),pu:cnt(evs,'fball','pu'),total:tot(evs,'fball')},
    fdiff:  {routine:cnt(good,'fdiff','routine'),tough:cnt(good,'fdiff','tough'),webgem:cnt(good,'fdiff','webgem'),total:tot(good,'fdiff')},
    ftype:  {bobble:cnt(errs,'ftype','bobble'),badthrow:cnt(errs,'ftype','badthrow'),lostit:cnt(errs,'ftype','lostit'),drop:cnt(errs,'ftype','drop'),total:tot(errs,'ftype')}
  };
}

function avgFmt(h,ab){ return ab===0?'.000':('.'+String(Math.round(h/ab*1000)).padStart(3,'0')); }
function obpFmt(s){ const d=s.ab+s.bb+s.hbp+s.sf; return d===0?'.000':('.'+String(Math.round((s.h+s.bb+s.hbp)/d*1000)).padStart(3,'0')); }
function slgFmt(s){ return s.ab===0?'.000':('.'+String(Math.round((s.h-s.d-s.t-s.hr + 2*s.d + 3*s.t + 4*s.hr)/s.ab*1000)).padStart(3,'0')); }
function opsFmt(s){
  const obp = s.ab+s.bb+s.hbp+s.sf===0?0:(s.h+s.bb+s.hbp)/(s.ab+s.bb+s.hbp+s.sf);
  const slg = s.ab===0?0:(s.h-s.d-s.t-s.hr+2*s.d+3*s.t+4*s.hr)/s.ab;
  const ops = obp+slg;
  return ops===0?'.000':('.'+String(Math.round(ops*1000)).padStart(3,'0'));
}
function wobaFmt(s){
  const num = 0.69*s.bb + 0.72*s.hbp + 0.89*(s.h-s.d-s.t-s.hr) + 1.27*s.d + 1.62*s.t + 2.10*s.hr;
  const den = s.ab + s.bb + s.hbp + s.sf;
  if(den===0) return '.000';
  return '.'+String(Math.round(num/den*1000)).padStart(3,'0');
}
function babipFmt(s){
  const den = s.ab - s.k - s.hr + s.sf;
  if(den<=0) return '.000';
  return '.'+String(Math.round((s.h-s.hr)/den*1000)).padStart(3,'0');
}
function isoFmt(s){
  if(s.ab===0) return '.000';
  return '.'+String(Math.round((s.d + 2*s.t + 3*s.hr)/s.ab*1000)).padStart(3,'0');
}
function fpctFmt(po,a,e){ const tot=po+a+e; return tot===0?'—':((po+a)/tot).toFixed(3).replace('0.','.')||'1.000'; }
function pct(n,d){ return d===0?'—':(n/d*100).toFixed(1)+'%'; }

function calcSplitStats(games){
  const batEvs = games.flatMap(g=>g.events.filter(e=>e.type==='bat'));
  const isHit = r=>['1B','2B','3B','HR'].includes(r);
  const isAB  = r=>!['BB','HBP','SF'].includes(r);
  const res = {};
  const add = (key, ev) => {
    if(!res[key]) res[key]={ab:0,h:0};
    if(isAB(ev.result)) res[key].ab++;
    if(isHit(ev.result)) res[key].h++;
  };
  batEvs.forEach(ev=>{
    if(ev.traj)    add('traj_'+ev.traj, ev);
    if(ev.dir)     add('dir_'+ev.dir, ev);
    if(ev.contact) add('contact_'+ev.contact, ev);
  });
  return res;
}

function formatDate(ts){
  const d = new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);
}
function formatDateFull(ts){
  const d = new Date(ts);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

function getScoreTotals(game){
  const innings = game.innings || [];
  return {
    us:   innings.reduce((s,i)=>s+(i.us||0),0),
    them: innings.reduce((s,i)=>s+(i.them||0),0)
  };
}

function adjScore(team, delta){
  const game = db.games.find(g=>g.id===db.activeGameId);
  if(!game) return;
  if(!game.innings) game.innings = [{us:0,them:0}];
  const cur = game.innings[game.innings.length-1];
  cur[team] = Math.max(0, (cur[team]||0) + delta);
  save(db);
  renderLog();
  renderHome();
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────

function parseICS(text){
  const events = [];
  const unfolded = text.replace(/\r\n[ \t]/g,' ').replace(/\r\n/g,'\n');
  const lines = unfolded.split('\n');
  let evt = null;
  for(const raw of lines){
    const line = raw.trim();
    if(line === 'BEGIN:VEVENT'){ evt = {}; }
    else if(line === 'END:VEVENT' && evt){ events.push(evt); evt = null; }
    else if(evt){
      const colon = line.indexOf(':');
      if(colon < 0) continue;
      const keyPart = line.slice(0, colon);
      const val = line.slice(colon + 1);
      const baseKey = keyPart.split(';')[0].toUpperCase();
      const unescape = s => s.replace(/\\n/gi,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\');
      if(baseKey === 'DTSTART')     evt.start    = parseICSDate(val);
      if(baseKey === 'DTEND')       evt.end      = parseICSDate(val);
      if(baseKey === 'SUMMARY')     evt.summary  = unescape(val);
      if(baseKey === 'LOCATION')    evt.location = unescape(val);
      if(baseKey === 'DESCRIPTION') evt.description = unescape(val);
    }
  }
  return events.filter(e=>e.start).sort((a,b)=>a.start-b.start);
}

function parseICSDate(s){
  const digits = s.replace(/[^0-9]/g,'');
  if(digits.length >= 8){
    const yr = digits.slice(0,4);
    const mo = digits.slice(4,6);
    const dy = digits.slice(6,8);
    const hr = digits.slice(8,10)||'00';
    const mi = digits.slice(10,12)||'00';
    const d = new Date(`${yr}-${mo}-${dy}T${hr}:${mi}:00`);
    return isNaN(d) ? null : d.getTime();
  }
  return null;
}

function extractOpponent(summary, teamName){
  const s = (summary || '').trim();
  if(!s) return '';
  // Handle "Team A vs. Team B" or "Team A vs Team B" (TeamSideline format)
  const vsParts = s.split(/\s+vs\.?\s+/i);
  if(vsParts.length === 2){
    const a = vsParts[0].trim();
    const b = vsParts[1].trim();
    if(teamName){
      const tn = teamName.toLowerCase();
      // "Opponent vs. Our Team" → opponent is A
      if(b.toLowerCase().includes(tn) || tn.includes(b.toLowerCase())) return a;
      // "Our Team vs. Opponent" → opponent is B
      if(a.toLowerCase().includes(tn) || tn.includes(a.toLowerCase())) return b;
    }
    return b; // default: right-side is opponent
  }
  return s.replace(/\s*@\s*.*/,'').trim();
}

function getUpcomingGames(teamId){
  const team = db.teams.find(t=>t.id===teamId);
  if(!team || !team.calendar) return [];
  const now = Date.now() - 3600000 * 3;
  return (team.calendar.events || []).filter(e=>e.start >= now);
}

async function fetchCalendarURL(teamId){
  const urlInput = document.getElementById('cal-url-input');
  let url = (urlInput ? urlInput.value : '').trim();
  if(!url){ toast('Enter a calendar URL'); return; }
  url = url.replace(/^webcal:\/\//i,'https://');
  toast('Fetching calendar…');
  try {
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    saveCalendar(teamId, text, url);
    toast('Calendar imported! ✓');
    openCalendarModal(teamId);
  } catch(err) {
    console.error('Calendar fetch:', err);
    toast('Fetch failed — use file upload instead');
  }
}

function uploadCalendarFile(evt, teamId){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    saveCalendar(teamId, e.target.result, null);
    toast('Calendar imported! ✓');
    openCalendarModal(teamId);
  };
  reader.readAsText(file);
}

function saveCalendar(teamId, icsText, sourceUrl){
  const team = db.teams.find(t=>t.id===teamId);
  if(!team) return;
  const events = parseICS(icsText);
  team.calendar = { source: sourceUrl||'file', events, importedAt: Date.now() };
  save(db);
  renderTeams();
}

function renderUpcomingSuggestions(teamId){
  const upcoming = getUpcomingGames(teamId);
  if(!upcoming.length) return '';
  const team = db.teams.find(t=>t.id===teamId);
  // Group by calendar date to detect double headers
  const byDate = {};
  upcoming.forEach(ev=>{
    const d = new Date(ev.start);
    const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if(!byDate[k]) byDate[k] = [];
    byDate[k].push(ev);
  });
  // Show next 6 entries = 3 nights of double headers
  const show = upcoming.slice(0,6);
  return `<div class="fgrp">
    <label class="flbl">📅 Upcoming Double Headers</label>
    ${show.map(ev=>{
      const d = new Date(ev.start);
      const today = new Date();
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
      const isToday = d.toDateString()===today.toDateString();
      const isTomorrow = d.toDateString()===tomorrow.toDateString();
      const dateLbl = isToday ? 'TODAY' : isTomorrow ? 'TMRW' : `${d.getMonth()+1}/${d.getDate()}`;
      const timeLbl = d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
      const opp = extractOpponent(ev.summary||'', team ? team.name : '');
      // Determine Game 1 vs Game 2 within this night
      const dateKey = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const nightGames = byDate[dateKey] || [];
      const gameNum = nightGames.length > 1 ? nightGames.indexOf(ev) + 1 : null;
      const safeOpp = (opp||ev.summary||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="upcoming-game" onclick="useScheduledGame('${safeOpp}')">
        <div class="ug-date">${dateLbl}<br><span style="font-size:9px;opacity:.7">${timeLbl}</span></div>
        <div class="ug-info">
          <div class="ug-title">vs. ${opp||ev.summary}${gameNum?` <span style="font-size:10px;color:var(--am);font-weight:800">G${gameNum}</span>`:''}</div>
          ${ev.location?`<div class="ug-loc">📍 ${ev.location}</div>`:''}
        </div>
        <span style="color:var(--g);font-size:11px;font-weight:700;flex-shrink:0">Use →</span>
      </div>`;
    }).join('')}
  </div>`;
}

function updateUpcomingSuggestions(){
  const wrap = document.getElementById('start-game-upcoming-wrap');
  if(!wrap) return;
  wrap.innerHTML = selectedTeamId ? renderUpcomingSuggestions(selectedTeamId) : '';
}

function useScheduledGame(opponent){
  const inp = document.getElementById('input-opponent');
  if(inp){ inp.value = opponent; inp.focus(); }
  toast('Opponent filled in!');
}

// ─── MODALS ──────────────────────────────────────────────────────────────────

function openModal(id){ document.getElementById(id).classList.remove('hide'); }
function closeModal(id){ document.getElementById(id).classList.add('hide'); }
function closeModalOnBg(e, id){ if(e.target===document.getElementById(id)) closeModal(id); }

// ─── UTILS ───────────────────────────────────────────────────────────────────

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderHome();
renderHeader('home');
</script>
